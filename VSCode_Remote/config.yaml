name: VS Code Remote SSH (Debian)
version: "1.6.0"
slug: vscode_remote_debian
description: >-
  Glibc-based SSH server so VS Code desktop Remote-SSH can run its
  server on Home Assistant OS (avoids the Alpine/musl problem).
url: "https://github.com/Zipponia/HassOS_Addons/tree/main/VSCode_Remote"
arch:
  - aarch64
  - amd64
init: false
startup: services
# Remote access must come back on its own after a Home Assistant reboot,
# otherwise the add-on can only be started from the local UI.
boot: auto
host_network: false
ports:
  "22/tcp": 22
ports_description:
  "22/tcp": "SSH for VS Code Remote-SSH (host port 22)"
map:
  - homeassistant_config:rw
  - all_addon_configs:rw
  - addons:rw
  - ssl:rw
  - share:rw
  - backup:rw
  - media:rw
# --- Full-system access (Protection mode must be turned OFF in the add-on UI) ---
# Grants Claude Code inside the container control over Home Assistant, the
# Supervisor and every Docker container (including the Scrypted add-on).
hassio_api: true
hassio_role: admin
homeassistant_api: true
docker_api: true
full_access: true
privileged:
  - NET_ADMIN
  - NET_RAW
  - SYS_ADMIN
  - SYS_PTRACE
  - SYS_RAWIO
  - DAC_READ_SEARCH
apparmor: false
options:
  authorized_keys: []
  prune_old_vscode_servers: true
  keep_vscode_servers: 2
schema:
  authorized_keys:
    - str
  prune_old_vscode_servers: bool
  keep_vscode_servers: int(1,10)
